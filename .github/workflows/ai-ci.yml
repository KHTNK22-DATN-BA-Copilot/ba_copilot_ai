name: AI CI/CD

on:
  push:
    branches: 
      - main

env:
  IMAGE_NAME: ghcr.io/khtnk22-datn-ba-copilot/ba_copilot_ai/ai:latest

jobs:
  # ========== CI: Build & Lint ==========
  build_and_publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ===== Docker =====
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ secrets.ACTOR }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: Push Docker image
        run: docker push $IMAGE_NAME

  # ========== CD: Deploy ==========
  deploy:
    runs-on: ["self-hosted", "Linux", "X64"]
    needs: build_and_publish

    steps:
      - name: Login to GHCR (server)
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.ACTOR }} --password-stdin

      - name: Pull latest AI image
        run: docker pull $IMAGE_NAME

      - name: Restart AI service
        run: |
          docker compose pull ai
          docker compose up -d --force-recreate ai
        working-directory: /home/bacopilotteam/bacopilot

      - name: Cleanup old images
        run: docker image prune -f

      - name: Health check
        run: |
          echo "Waiting for AI..."
          sleep 10
          docker ps | grep ba-copilot-ai || echo "Warning: AI may not be running"
